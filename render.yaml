services:
  - type: web
    name: sentiment-analyzer-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python -c \"from transformers import pipeline; pipeline('sentiment-analysis', model='distilbert-base-uncased-finetuned-sst-2-english')\""
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.x
    autoDeploy: true
